name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun --filter '@greenware/server' test

      - name: Typecheck
        run: bun --filter '@greenware/server' typecheck

      - name: Build
        run: bun --filter '@greenware/server' build
